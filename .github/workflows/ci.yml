name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: finflow
          POSTGRES_PASSWORD: finflow
          POSTGRES_DB: finflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://finflow:finflow@localhost:5432/finflow_test
      ANTHROPIC_API_KEY: test-key
      ALPHA_VANTAGE_API_KEY: test-key
      API_KEY_SALT: ci-test-salt-minimum-16-chars
      WEBHOOK_SIGNING_SECRET: ci-test-secret-minimum-16-chars
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src/ --ext .ts

      - name: Run unit tests
        run: npx jest tests/unit --coverage --forceExit

      - name: Run database migrations
        run: npx prisma db push

      - name: Run integration tests
        run: npx jest tests/integration --forceExit

      - name: Build Docker image
        run: docker build -t finflow:ci .
